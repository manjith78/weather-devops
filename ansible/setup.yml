- name: DevOps Setup
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Update system
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started

    - name: Verify Docker
      command: docker --version

    - name: Check Kubernetes files
      command: ls