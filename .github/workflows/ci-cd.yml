name: Weather App CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "feature-ui" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/weather-app:latest
          ${{ secrets.DOCKER_USERNAME }}/weather-app:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/weather-app:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/weather-app:buildcache,mode=max
    
    - name: Verify Docker image
      if: github.event_name != 'pull_request'
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/weather-app:latest
        docker run --rm ${{ secrets.DOCKER_USERNAME }}/weather-app:latest nginx -v
    
    - name: Summary
      run: |
        echo "✅ Build completed successfully"
        echo "Image: ${{ secrets.DOCKER_USERNAME }}/weather-app"
        echo "Commit: ${{ github.sha }}"