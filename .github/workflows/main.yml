name: Full DevOps Pipeline

on:
  push:
    branches: [ "main", "feature-ui" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/weather-app .

    - name: Test Application
      run: echo "Test Passed"

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/weather-app

    - name: Kubernetes Deploy (Simulated)
      run: echo "Deploy via Minikube"