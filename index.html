<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        input {
            padding: 10px;
            width: 80%;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
        }

        canvas {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Weather Dashboard</h1>

<div class="container">

    <div class="card">
        <h3>Search Weather</h3>
        <input type="text" id="city" placeholder="Enter City">
        <br>
        <button onclick="getWeather()">Check</button>

        <div id="result"></div>
    </div>

    <div class="card">
        <h3>Temperature Trend</h3>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
let chart;

function getWeather() {
    const city = document.getElementById("city").value;

    const temps = [28, 30, 29, 31, 32, 30, 29];

    document.getElementById("result").innerHTML =
        "<h2>" + city + "</h2><p>Temperature: " + temps[0] + "°C</p>";

    if (chart) {
        chart.destroy();
    }

    const ctx = document.getElementById('chart').getContext('2d');

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
            datasets: [{
                label: 'Temperature °C',
                data: temps,
                borderColor: '#00c6ff',
                backgroundColor: 'rgba(0,198,255,0.2)',
                fill: true,
                tension: 0.4
            }]
        }
    });
}
</script>

</body>
</html>
