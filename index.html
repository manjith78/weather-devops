<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        .card {
            background: rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            width: 80%;
            border: none;
            border-radius: 8px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #ffffff;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        h1 {
            font-size: 40px;
        }

        #result {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Weather Dashboard</h1>

    <div class="card">
        <input type="text" id="city" placeholder="Enter City">
        <br>
        <button onclick="getWeather()">Check Weather</button>

        <div id="result"></div>
    </div>
</div>

<script>
function getWeather() {
    const city = document.getElementById("city").value;
    document.getElementById("result").innerHTML =
        "Weather in " + city + ": 28°C, Clear Sky";
}
</script>

</body>
</html>
